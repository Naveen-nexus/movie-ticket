# Server Configuration
server.port=8080
spring.application.name=movie-booking-backend

# Supabase PostgreSQL Configuration (Session Pooler - Port 5432)
spring.datasource.url=jdbc:postgresql://aws-1-ap-south-1.pooler.supabase.com:5432/postgres
spring.datasource.username=postgres.hpscewumpbxnegjgrwkn
spring.datasource.password=TickeeHub123
spring.datasource.driver-class-name=org.postgresql.Driver

# JDBC Template Configuration
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# Database Initialization - Use SQL scripts instead of auto-creation
# IMPORTANT: Tables are created by db/init.sql, not Spring Boot
# Set to 'none' for production, or 'validate' to verify schema matches entities
spring.jpa.hibernate.ddl-auto=none

# JWT Configuration
jwt.secret=your-256-bit-secret-key-change-this-in-production
jwt.expiration=86400000

# Email Configuration (for booking confirmations)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# CORS Configuration (allow frontend)
cors.allowed.origins=http://localhost:3000,http://localhost:5173

# Logging
logging.level.org.springframework.jdbc.core=DEBUG
logging.level.com.moviereserve=DEBUG
